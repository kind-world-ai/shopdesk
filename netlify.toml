[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Next.js runtime plugin (handles SSR, API routes, dynamic routes)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# SPA-style fallback for client-side routing
[[redirects]]
  from = "/shop/*"
  to = "/shop/:splat"
  status = 200

[[redirects]]
  from = "/checkout/*"
  to = "/checkout/:splat"
  status = 200

# Custom headers for security & caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
